steps:
# Install backend dependencies
- name: 'node:22-slim'
  entrypoint: 'npx'
  args: ['pnpm', 'install', '--prod', '--frozen-lockfile']
  dir: 'server'

# Build the Docker image for the backend
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/orecalc-api:$COMMIT_SHA', '.']
  dir: 'server'

# Push the Docker image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/orecalc-api:$COMMIT_SHA']

# Deploy the backend to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['run', 'deploy', 'orecalc-api',
         '--image', 'gcr.io/$PROJECT_ID/orecalc-api:$COMMIT_SHA',
         '--region', 'europe-west1',
         '--allow-unauthenticated',
         '--platform', 'managed',
         '--port', '8080',
         '--update-secrets', 'CLASH_OF_CLANS_API_TOKEN=clash-of-clans-api-token:latest',
         '--update-secrets', 'FIRESTORE_SA_KEY=orecalc-firestore-sa-key:latest',
         '--update-secrets', 'SMTP_PASS=smtp-password:latest',
         '--update-env-vars', 'SMTP_HOST=smtp.zoho.eu,SMTP_PORT=465,SMTP_SECURE=true,SMTP_USER=admin@clashcalc.com,EMAIL_FROM=noreply@clashcalc.com,RECIPIENT_EMAIL_LEGAL=legal@clashcalc.com,RECIPIENT_EMAIL_SUPPORT=support@clashcalc.com,RECIPIENT_EMAIL_SECURITY=security@clashcalc.com']
  entrypoint: gcloud

images:
- 'gcr.io/$PROJECT_ID/orecalc-api:$COMMIT_SHA'
