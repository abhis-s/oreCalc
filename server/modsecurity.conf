# ==========================================
# OreCalc API - ModSecurity WAF Configuration
# ==========================================

# --- 1. Basic WAF Configuration & Engine Settings ---
# Enforce ModSecurity processing (On = block/intercept, DetectionOnly = log only)
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json

# --- 2. Request Body & Payload Size Hardening ---
# Restrict request body size to 1MB (1,048,576 bytes) to prevent DoS/Buffer Overflow attacks
SecRequestBodyLimit 1048576
SecRequestBodyNoFilesLimit 1048576
SecRequestBodyInMemoryLimit 1048576

# Reject requests exceeding the size limit immediately with a 413 Payload Too Large
SecRequestBodyLimitAction Reject

# Response body limits
SecResponseBodyLimit 524288
SecResponseBodyLimitAction ProcessPartial

# Temp & Debug Log configuration
SecTmpDir /tmp/
SecDataDir /tmp/
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsec_audit.log

# --- 3. OWASP ModSecurity Core Rule Set (CRS) Integration ---
#
# To use the OWASP CRS, place this file alongside the CRS files and include them 
# in your main webserver configuration (nginx.conf / httpd.conf):
#
#     Include /path/to/modsecurity.conf
#     Include /path/to/crs-setup.conf
#     Include /path/to/rules/*.conf
#

# --- 4. Anomaly Scoring Mode Configuration ---
# CRS default mode is Anomaly Scoring. Inbound/outbound threshold rules are 
# evaluated, adding points to the cumulative threat score. If the score 
# exceeds the threshold, the request is blocked.
#
# Define default CRS anomaly thresholds (Default: Inbound = 5, Outbound = 4):
SecAction \
    "id:900110,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.inbound_anomaly_score_threshold=5,\
    setvar:tx.outbound_anomaly_score_threshold=4"

# Set the Paranoia Level (Default: 1 - lowest false positives, highest compatibility)
# Level 1-4. Level 2 or 3 is recommended for extra hardened APIs.
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.paranoia_level=1"

# --- 5. Baseline Fallback / API Security Rules ---
# These rules serve as a fallback if the full OWASP CRS rules are not loaded.

# Rule 1: HTTP Method Restrictions
# Only allow GET, POST, DELETE, and OPTIONS methods
SecRule REQUEST_METHOD "!^(?:GET|POST|DELETE|OPTIONS)$" \
    "id:400001,phase:1,deny,log,status:405,msg:'Method Not Allowed'"

# Rule 2: SQL Injection (SQLi) Protection
# Block common SQL keywords in query strings and post payloads
SecRule REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_FILENAME|ARGS_NAMES|ARGS|XML:/* \
    "(?i:(\b(select|union|insert|update|delete|drop|alter|truncate|create)\b))" \
    "id:400002,phase:2,deny,log,status:400,msg:'SQL Injection Attempt Detected'"

# Rule 3: Cross-Site Scripting (XSS) Protection
# Block inline scripts, script tags, javascript: URIs
SecRule REQUEST_COOKIES|REQUEST_COOKIES_NAMES|REQUEST_FILENAME|ARGS_NAMES|ARGS|XML:/* \
    "(?i:(<script\b|javascript:|onerror\s*=|onload\s*=))" \
    "id:400003,phase:2,deny,log,status:400,msg:'Cross-Site Scripting (XSS) Attempt Detected'"

# Rule 4: Directory Traversal / LFI Protection
# Prevent path traversal attacks (e.g. ../../etc/passwd)
SecRule ARGS|ARGS_NAMES|REQUEST_FILENAME \
    "(?:\.\./|\.\.\\|[/\\]etc[/\\]passwd|boot\.ini)" \
    "id:400004,phase:2,deny,log,status:400,msg:'Path Traversal / LFI Attempt Detected'"

# Rule 5: Block Malicious User Agents
# Reject known malicious scrapers, vulnerability scanners, and bots
SecRule REQUEST_HEADERS:User-Agent \
    "(?i:(nikto|sqlmap|dirbuster|w3af|acunetix|nessus|webinspect|nmap|censys))" \
    "id:400005,phase:1,deny,log,status:403,msg:'Vulnerability Scanner Blocked'"
