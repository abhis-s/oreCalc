<div id="accent-picker-modal" class="modal">
    <div class="modal-content accent-picker-modal-content">
        <div class="modal-header">
            <h2 data-i18n="settings.options.accentColor">Accent Color</h2>
            <button id="close-accent-picker-btn" class="close-button" data-i18n-aria-label="actions.close" aria-label="Close">
                <orecalc-assets-svg name="close"></orecalc-assets-svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="mobile-accent-grid">
                <button class="mobile-accent-swatch" data-color="blue" data-i18n-aria-label="colors.blue" aria-label="Blue Accent"></button>
                <button class="mobile-accent-swatch" data-color="gold" data-i18n-aria-label="colors.gold" aria-label="Gold Accent"></button>
                <button class="mobile-accent-swatch" data-color="purple" data-i18n-aria-label="colors.purple" aria-label="Purple Accent"></button>
                <button class="mobile-accent-swatch" data-color="green" data-i18n-aria-label="colors.green" aria-label="Green Accent"></button>
                <button class="mobile-accent-swatch" data-color="red" data-i18n-aria-label="colors.red" aria-label="Red Accent"></button>
                <button class="mobile-accent-swatch" data-color="random" data-i18n-aria-label="colors.random" aria-label="Random Accent" title="Random"></button>
            </div>
        </div>
    </div>
</div>
