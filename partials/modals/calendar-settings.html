<div id="calendar-settings-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 data-i18n="planner.settingsModal.title">Calendar Settings</h2>
            <button id="close-calendar-settings-modal-btn" class="close-button" data-i18n-aria-label="actions.close" aria-label="Close">
                <orecalc-assets-svg name="close"></orecalc-assets-svg>
            </button>
        </div>
        <div class="modal-body flex-column-gap-15">
            <div class="input-group-flex">
                <div class="field-descriptor-group">
                    <label for="calendar-first-day-select" data-i18n="planner.settingsModal.firstDayOfWeek">First Day of Week</label>
                    <p class="form-setting-text" data-i18n="planner.settingsModal.firstDayOfWeekDesc">Choose when your week starts on the calendar.</p>
                </div>
                <select id="calendar-first-day-select" class="dropdown-style">
                    <option value="auto" data-i18n="planner.settingsModal.auto">Auto</option>
                    <option value="monday" data-i18n="planner.settingsModal.monday">Monday</option>
                    <option value="sunday" data-i18n="planner.settingsModal.sunday">Sunday</option>
                </select>
            </div>

            <div class="input-group-flex">
                <div class="field-descriptor-group">
                    <label for="calendar-auto-place-scope-select" data-i18n="planner.settingsModal.autoPlaceScope">Auto-Placement Scope</label>
                    <p class="form-setting-text" data-i18n="planner.settingsModal.autoPlaceScopeDesc">Decide if chips are placed for the month or year.</p>
                </div>
                <select id="calendar-auto-place-scope-select" class="dropdown-style">
                    <option value="month" data-i18n="planner.settingsModal.currentMonth">Current Month</option>
                    <option value="year" data-i18n="planner.settingsModal.entireYear">Entire Year</option>
                </select>
            </div>

            <div class="input-group-flex">
                <div class="field-descriptor-group">
                    <label for="calendar-show-icons-switch" data-i18n="planner.settingsModal.showChipIcons">Show Resource Icons</label>
                    <p class="form-setting-text" data-i18n="planner.settingsModal.showChipIconsDesc">Display icons for ores and leagues on chips.</p>
                </div>
                <div class="switch">
                    <input type="checkbox" id="calendar-show-icons-switch">
                    <span class="slider round"></span>
                </div>
            </div>
        </div>
        <div class="modal-actions">
            <button id="cancel-calendar-settings-btn" class="reject-button" data-i18n="actions.cancel">Cancel</button>
            <button id="save-calendar-settings-btn" class="accept-button" data-i18n="actions.save">Save</button>
        </div>
    </div>
</div>
