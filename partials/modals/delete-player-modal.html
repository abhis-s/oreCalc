<div id="delete-player-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 data-i18n="actions.completeDelete">Complete Deletion</h2>
            <button id="close-delete-player-modal-btn" class="close-button">
                <orecalc-assets-svg name="close"></orecalc-assets-svg>
            </button>
        </div>
        <div class="modal-info-text">
            <p data-i18n="settings.completeDeleteInfo">This will verify your ownership using the official Clash of Clans API. Once verified, we will permanently remove this player tag from all associated OreCalc user IDs across our entire database.</p>
        </div>
        <div class="player-name-input-container" id="delete-tag-container">
            <label for="delete-player-tag-input" data-i18n="player.tag">Player Tag</label>
            <input type="text" id="delete-player-tag-input" placeholder="Enter player tag" maxlength="12" data-i18n-placeholder="player.placeholderTag">
            <div id="delete-player-tag-error" class="error-message"></div>
        </div>
        <div class="player-name-input-container hidden" id="delete-token-container" style="margin-top: 15px;">
            <label for="delete-player-token-input" data-i18n="player.apiToken">In-Game API Token</label>
            <input type="text" id="delete-player-token-input" placeholder="e.g. a9378kca" maxlength="8" data-i18n-placeholder="player.placeholderToken">
            <small style="color: var(--color-grey-400); font-size: 0.85em; margin-top: 5px; display: block;" data-i18n="player.apiTokenHint">Hint: You can find your API Token in game under Settings > More Settings > API Token.</small>
            <div id="delete-player-token-error" class="error-message"></div>
        </div>
        <div class="modal-actions" id="delete-modal-actions-validate">
            <button id="cancel-delete-player-btn" class="reject-button" data-i18n="actions.cancel">Cancel</button>
            <button id="validate-delete-player-btn" class="accept-button" data-i18n="actions.validate">Validate</button>
        </div>
        <div class="modal-actions hidden" id="delete-modal-actions-verify">
            <button id="cancel-delete-verify-btn" class="reject-button" data-i18n="actions.cancel">Cancel</button>
            <button id="verify-delete-player-btn" class="accept-button" data-i18n="actions.verify">Verify</button>
        </div>
    </div>
</div>
