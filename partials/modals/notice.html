    <div id="notice-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="notice-modal-title">Notice</h2>
            </div>
            <div id="notice-modal-body" class="modal-body">
                <p id="notice-modal-message"></p>
            </div>
            <div class="modal-actions">
                <button id="notice-modal-cancel-btn" class="reject-button" style="display: none;" data-i18n="actions.cancel">Cancel</button>
                <button id="notice-modal-ok-btn" class="accept-button">OK</button>
            </div>
        </div>
    </div>
