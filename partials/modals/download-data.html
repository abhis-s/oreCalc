<div id="download-data-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 data-i18n="download.title">Download Your Data</h2>
            <button id="close-download-data-modal-btn" class="close-button" data-i18n-aria-label="actions.close" aria-label="Close">
                <orecalc-assets-svg name="close"></orecalc-assets-svg>
            </button>
        </div>
        <div class="modal-info-text">
            <p data-i18n="download.description">This will export your entire application state (players, equipment, planner) into a JSON file. You can use this file to backup your progress or import it on another device.</p>
            <p id="download-filename-preview" style="margin-top: 15px; font-size: 0.9em; color: var(--text-secondary);"></p>
        </div>
        <div class="modal-actions">
            <button id="cancel-download-data-btn" class="reject-button" data-i18n="actions.cancel">Cancel</button>
            <button id="confirm-download-data-btn" class="accept-button" data-i18n="actions.download">Download</button>
        </div>
    </div>
</div>
