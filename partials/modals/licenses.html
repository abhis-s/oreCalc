<div id="licenses-modal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h2 data-i18n="settings.openSourceLicenses">Open Source Licenses</h2>
            <div class="modal-header-actions">
                <a href="licenses.html" target="_blank" id="licenses-open-external-btn" class="close-button" aria-label="Open in new tab" title="Open in new tab">
                    <orecalc-assets-svg name="open-in-new"></orecalc-assets-svg>
                </a>
                <button id="close-licenses-header-btn" class="close-button" aria-label="Close" title="Close">
                    <orecalc-assets-svg name="close"></orecalc-assets-svg>
                </button>
            </div>
        </div>
        <div id="licenses-container" class="modal-body">
            <!-- Dynamic content will be inserted here -->
        </div>
        <div class="modal-actions">
            <button id="close-licenses-modal-btn" class="reject-button" data-i18n="actions.close">Close</button>
        </div>
    </div>
</div>
