<div id="import-data-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 data-i18n="actions.import">Import Data</h2>
            <button id="close-import-data-modal-btn" class="close-button" data-i18n-aria-label="actions.close" aria-label="Close">
                <orecalc-assets-svg name="close"></orecalc-assets-svg>
            </button>
        </div>
        <div class="modal-info-text">
            <p data-i18n="player.qrScanInstruction">Use your device camera to scan a QR code. The app will reload with the imported data.</p>
        </div>
        <div class="import-data-input-container">
            <label for="modal-import-user-id-input" data-i18n="player.userId">User ID</label>
            <input type="text" id="modal-import-user-id-input" placeholder="Paste or type User ID" data-i18n-placeholder="player.placeholderUserId" maxlength="36" spellcheck="false">
            <div id="modal-import-user-id-error" class="error-message"></div>
        </div>
        <div class="modal-actions">
            <button id="cancel-import-data-btn" class="reject-button" data-i18n="actions.cancel">Cancel</button>
            <button id="confirm-import-data-btn" class="accept-button" data-i18n="actions.import">Import</button>
        </div>
    </div>
</div>
