<div id="privacy-modal" class="modal">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h2 data-i18n="settings.privacyPolicy">Privacy Policy</h2>
            <div class="modal-header-actions">
                <a href="privacy.html" target="_blank" id="privacy-open-external-btn" class="close-button" aria-label="Open in new tab" title="Open in new tab">
                    <orecalc-assets-svg name="open-in-new"></orecalc-assets-svg>
                </a>
                <button id="privacy-translate-btn" class="close-button" aria-label="Translate" title="Translate" style="display: none;">
                    <orecalc-assets-svg name="translate"></orecalc-assets-svg>
                </button>
                <button id="privacy-theme-toggle-btn" class="close-button" aria-label="Toggle Theme">
                    <orecalc-assets-svg name="dark-mode" class="icon-dark"></orecalc-assets-svg>
                </button>
                <button id="close-privacy-header-btn" class="close-button" data-i18n-aria-label="actions.close" aria-label="Close">
                    <orecalc-assets-svg name="close"></orecalc-assets-svg>
                </button>
            </div>
        </div>
        <div class="modal-body text-left" style="padding: 0; overflow: hidden; display: flex; flex-direction: column; flex: 1; min-height: 0;">
            <iframe id="privacy-policy-iframe" src="privacy.html" style="border: none; width: 100%; height: 100%; flex: 1; background: transparent;" title="Privacy Policy"></iframe>
        </div>
        <div class="modal-actions">
            <button id="close-privacy-modal-btn" class="reject-button" data-i18n="actions.close">Close</button>
            <button id="accept-privacy-modal-btn" class="accept-button" style="display: none;" data-i18n="actions.accept">Accept</button>
        </div>
    </div>
</div>
