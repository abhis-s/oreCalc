                    <option value="extras" data-i18n="planner.createCustomChipsModal.typeExtras">Extras (Custom)</option>

                                    <input type="number" id="custom-chip-supercellEvents-starry" min="0" max="500" maxlength="3" value="0">

                                <label for="custom-chip-supercellEvents-starry"><orecalc-assets-image src="assets/starry_ore.png" alt="Starry Ore" data-i18n-alt="ores.starry" class="ore-image"></orecalc-assets-image></label>
                            </div>

                        <div class="input-group-flex">

                                </div>
                                <div class="dropdown-options"></div>
                            </div>
                            <div class="popover-wrapper">
                                <input type="number" id="custom-chip-prospector-from-amount" value="0" min="0" max="25000" maxlength="6">
                            </div>
                            <div class="prospector-arrow">➔</div>
                            <div class="popover-wrapper">
                                <input type="number" id="custom-chip-prospector-to-amount" value="0" min="0" max="25000" maxlength="6">
                            </div>
                            <div class="custom-dropdown" id="custom-chip-prospector-to-ore">
                                <div class="dropdown-selected">
                                    <orecalc-assets-image src="assets/glowy_ore.png" alt="Glowy Ore" data-i18n-alt="ores.glowy"></orecalc-assets-image>
                                </div>
                                <div class="dropdown-options"></div>
                            </div>
                        </div>
                        <div class="input-group-flex">
                            <div class="field-descriptor-group">
                                <label for="custom-chip-prospector-count" data-i18n="planner.createCustomChipsModal.numChips">Number of chips to create</label>
                            </div>
                            <div class="popover-wrapper">
                                <input type="number" id="custom-chip-prospector-count" min="1" max="30" maxlength="2" value="1" class="small-number-input">
                            </div>
                        </div>
                        <div class="input-group-flex">
                            <div class="field-descriptor-group">
                                <label for="custom-chip-prospector-monthly" data-i18n="planner.createCustomChipsModal.createMonthly">Create monthly</label>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="custom-chip-prospector-monthly">
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Per Chip Rewards Preview -->
                <div id="custom-chip-rewards-preview" class="custom-chip-rewards-preview" style="display: none;">
                    <span class="preview-label" data-i18n="planner.createCustomChipsModal.perChipRewards">Per chip rewards:</span>
                    <span id="custom-chip-preview-shiny-container" class="preview-ore-item">
                        <span id="custom-chip-preview-shiny">0</span>
                        <orecalc-assets-image src="assets/shiny_ore.png" alt="Shiny Ore" class="ore-image"></orecalc-assets-image>
                    </span>
                    <span id="custom-chip-preview-glowy-container" class="preview-ore-item">
                        <span id="custom-chip-preview-glowy">0</span>
                        <orecalc-assets-image src="assets/glowy_ore.png" alt="Glowy Ore" class="ore-image"></orecalc-assets-image>
                    </span>
                    <span id="custom-chip-preview-starry-container" class="preview-ore-item">
                        <span id="custom-chip-preview-starry">0</span>

        <div class="modal-actions">
            <button id="cancel-create-custom-chips-btn" class="reject-button" data-i18n="actions.cancel">Cancel</button>

        </div>
    </div>
