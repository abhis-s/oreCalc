    <header class="header-container">
        <div class="hamburger" tabindex="0" role="button" aria-label="Menu" aria-expanded="false">
            <orecalc-assets-svg name="menu" class="menu-icon"></orecalc-assets-svg>
        </div>
        <div class="header-brand">
            <h1 class="brand-title">OreCalc</h1>
        </div>

        <div class="tab-bar-container">
            <button class="tab-button active" data-tab="home" data-i18n="nav.home">Home</button>
            <button class="tab-button" data-tab="equipment" data-i18n="nav.equipment">Equipment</button>
            <button class="tab-button" data-tab="income" data-i18n="nav.income">Income</button>
            <button class="tab-button" data-tab="planner" data-i18n="nav.planner">Planner</button>
            <button class="tab-button" data-tab="settings" data-i18n="nav.settings">Settings</button>
        </div>
        <div class="player-dropdown-container">
            <button id="player-dropdown-button" class="player-dropdown-button">
                <span id="selected-player-name"></span>
                <orecalc-assets-svg name="chevron-down" class="dropdown-arrow"></orecalc-assets-svg>
            </button>
            <div id="player-dropdown-list" class="player-dropdown-list">
                <div id="player-items-container"></div>
                <button id="add-player-button" class="add-player-button" data-i18n="player.addPlus">+ Add Player</button>
            </div>
        </div>

        <div class="data-buttons-container">
            <button id="refresh-button" class="animated-btn btn-accent task-btn" data-i18n-aria-label="actions.refresh" aria-label="Refresh">
                <span class="animated-btn-icon-wrapper">
                    <orecalc-assets-svg name="refresh"></orecalc-assets-svg>
                </span>
                <span class="animated-btn-text" data-i18n="actions.refresh">Refresh</span>
                <span class="button-loader">
                    <span></span><span></span><span></span>
                </span>
                <span class="button-success-icon"><orecalc-assets-svg name="cloud-check"></orecalc-assets-svg></span>
                <span class="button-error-icon"><orecalc-assets-svg name="cloud-error"></orecalc-assets-svg></span>
            </button>
        </div>
    </header>
