    <title data-i18n="app.title">Ore Calculator</title>
    <meta name="description"
        content="Stop guessing, start upgrading! OreCalc helps you manage your equipment and ores with ease. Forecast your income, schedule your next big upgrade on the calendar, and optimize your path to victory. Whether you're a casual player or a maxxer, we've got your back.">
    <link rel="icon" href="assets/favicon.png" type="image/x-icon">

    <style>
        #preloader {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            z-index: 9999;
            overflow: hidden;
        }
        @media (prefers-color-scheme: light) {
            #preloader:not(.dark-mode-override) {
                background-color: #ffffff;
            }
        }
        .modal {
            position: fixed !important;
            inset: 0 !important;
            display: none !important;
            z-index: 2000 !important;
        }
        .modal.show {
            display: flex !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
        #notice-modal, #stored-ores-modal {
            z-index: 2001 !important;
        }
        .tab-content {
            display: none !important;
        }
        .tab-content.active {
            display: block !important;
        }
        .supercell-notice, .app-copyright {
            display: none !important;
        }
        .supercell-notice.show, .app-copyright.show {
            display: block !important;
        }
    </style>
    <meta name="theme-color" content="#2c2e30">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="OreCalc">
    <meta property="og:site_name" content="OreCalc">
    <meta property="og:title" content="Ore Calculator for Clash of Clans">
    <meta property="og:description"
        content="Stop guessing, start upgrading! OreCalc helps you manage your equipment and ores with ease. Forecast your income, schedule your next big upgrade on the calendar, and optimize your path to victory. Whether you're a casual player or a maxxer, we've got your back.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://orecalc.tech/">
    <meta property="og:image" content="https://orecalc.tech/assets/app_icon_large.png">
    <meta property="og:logo" content="https://orecalc.tech/assets/app_icon_large.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "OreCalc",
      "operatingSystem": "All",
      "applicationCategory": "UtilityApplication",

        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "OreCalc is an optimization calculator for managing Clash of Clans equipment upgrades and scheduling ore requirements."

    </script>
